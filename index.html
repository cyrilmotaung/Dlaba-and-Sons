<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiftSync Pro - SMME OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-font-smoothing: antialiased; }
        
        /* Premium Animations */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .pop-in { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        
        /* Modern Invisible Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Form Input Autofill Fix */
        input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px white inset !important; }

        /* Responsive Table Magic - Mobile Cards */
        @media (max-width: 768px) {
            .mobile-cards thead { display: none; }
            .mobile-cards tr { 
                display: flex; flex-direction: column; background: white; margin-bottom: 1rem; 
                border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); padding: 1.25rem; 
            }
            .mobile-cards td { 
                display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border: none !important; width: 100%; text-align: right; 
            }
            .mobile-cards td::before { 
                content: attr(data-label); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.1em; margin-right: 1rem; text-align: left; 
            }
            .mobile-cards td:first-child { 
                flex-direction: column; align-items: flex-start; border-bottom: 1px solid #f1f5f9 !important; padding-bottom: 1rem; margin-bottom: 0.5rem; 
            }
            .mobile-cards td:first-child::before { display: none; }
        }

        /* Print Styles */
        @media print {
            body * { visibility: hidden; }
            #printable-document, #printable-document * { visibility: visible; }
            #printable-document { position: absolute; left: 0; top: 0; width: 100%; padding: 0; margin: 0; background-color: white; box-shadow: none; border: none; }
            #modal-backdrop { background: white !important; align-items: flex-start; padding: 0; }
            #modal-content { max-height: none !important; overflow: visible !important; box-shadow: none !important; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="text-slate-800 flex flex-col lg:flex-row min-h-screen selection:bg-indigo-200 selection:text-indigo-900">

    <!-- Global Header (Mobile) -->
    <header class="bg-white/80 backdrop-blur-xl border-b border-slate-200/80 px-5 py-3 flex justify-between items-center z-30 sticky top-0 lg:hidden">
        <div class="flex items-center space-x-3">
            <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-600/30">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <span class="font-extrabold text-xl tracking-tight text-slate-900">ShiftSync</span>
        </div>
        <div class="flex items-center space-x-2">

            </button>

            </button>

    <!-- Sidebar Navigation -->

        <div class="p-6 pt-8 border-b border-slate-100 flex items-center justify-between">

            </div>
            <button onclick="window.toggleMobileMenu()" class="lg:hidden p-2 text-slate-400 hover:text-slate-600 bg-slate-50 rounded-full"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>

                    <div class="p-1 rounded-lg group-hover:bg-white group-hover:shadow-sm transition-all"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>
                    <span class="text-[15px]">Client Quotes</span>

        <div class="p-6">
            <div class="flex items-center justify-between p-3.5 bg-slate-50 rounded-2xl border border-slate-200/60 hover:border-slate-300 transition-colors cursor-pointer">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white font-black text-sm shadow-md">AD</div>
                    <div class="overflow-hidden">
                        <p class="text-slate-900 font-bold text-sm truncate">Admin User</p>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-0.5 flex items-center">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1.5 shadow-[0_0_5px_rgba(16,185,129,0.5)]"></span> Local Data

        </div>
    </aside>

    <!-- Global Omni-Action Menu -->
    <div id="quick-add-menu" class="fixed top-16 md:top-6 right-4 md:right-10 z-[60] bg-white/90 backdrop-blur-2xl rounded-3xl shadow-2xl shadow-slate-900/10 border border-white w-64 p-3 hidden pop-in ring-1 ring-slate-900/5">
        <div class="px-3 py-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Create New</div>
        <button onclick="window.openEmployeeModal(); window.toggleQuickAdd();" class="w-full flex items-center space-x-3 px-3 py-3 rounded-2xl hover:bg-white hover:shadow-sm text-slate-700 transition-all text-sm font-bold group">
            <div class="p-2 bg-blue-50 text-blue-600 rounded-xl group-hover:bg-blue-600 group-hover:text-white transition-colors"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg></div>

        <button onclick="window.openAddShiftModal(null, null); window.toggleQuickAdd();" class="w-full flex items-center space-x-3 px-3 py-3 rounded-2xl hover:bg-white hover:shadow-sm text-slate-700 transition-all text-sm font-bold group">
            <div class="p-2 bg-emerald-50 text-emerald-600 rounded-xl group-hover:bg-emerald-600 group-hover:text-white transition-colors"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="10" y1="16" x2="14" y2="16"/></svg></div>
            <span>Schedule Shift</span>
        </button>
        <button onclick="window.openQuoteBuilder(); window.toggleQuickAdd();" class="w-full flex items-center space-x-3 px-3 py-3 rounded-2xl hover:bg-white hover:shadow-sm text-slate-700 transition-all text-sm font-bold group">
            <div class="p-2 bg-indigo-50 text-indigo-600 rounded-xl group-hover:bg-indigo-600 group-hover:text-white transition-colors"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg></div>
            <span>Client Quote</span>

    <!-- Main Workspace -->
    <main class="flex-1 w-full max-h-screen overflow-hidden flex flex-col relative">
        <!-- Desktop Header -->
        <header class="hidden lg:flex justify-between items-center bg-white/70 backdrop-blur-xl border-b border-slate-200/60 px-10 py-5 sticky top-0 z-40">
            <div id="header-title" class="font-black text-2xl text-slate-900 tracking-tight">Dashboard</div>
            <button onclick="window.toggleQuickAdd()" class="flex items-center space-x-2 bg-slate-900 text-white px-5 py-2.5 rounded-xl hover:bg-slate-800 active:scale-95 transition-all shadow-lg shadow-slate-900/20 font-bold text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span>Quick Create</span>
            </button>
        </header>

        <div id="content-area" class="p-4 sm:p-6 lg:p-10 max-w-7xl mx-auto w-full pb-24 overflow-y-auto flex-1">
            <!-- Dynamic Content Renders Here -->
        </div>
    </main>

    <!-- Modals & Overlays -->
    <div id="mobile-menu-overlay" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-40 hidden lg:hidden fade-in" onclick="window.toggleMobileMenu()"></div>
    <div id="quick-add-overlay" class="fixed inset-0 z-50 hidden" onclick="window.toggleQuickAdd()"></div>
    
    <div id="modal-backdrop" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[70] hidden flex items-center justify-center p-4 sm:p-6 fade-in overflow-y-auto">
        <div id="modal-content" class="bg-white rounded-[2rem] shadow-2xl shadow-slate-900/20 border border-white/50 w-full max-w-xl mx-auto p-6 sm:p-8 my-auto relative flex flex-col max-h-[90vh]">
            <!-- Modal Content Injected Here -->
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 sm:left-auto sm:transform-none sm:right-6 z-[80] flex flex-col gap-3 pointer-events-none w-full max-w-xs px-4 sm:px-0"></div>

    <!-- Application Logic -->
    <script>
        // --- State Management ---
        let state = {
            employees: JSON.parse(localStorage.getItem('shiftSync_employees')) || [],
            shifts: JSON.parse(localStorage.getItem('shiftSync_shifts')) || [],
            quotes: JSON.parse(localStorage.getItem('shiftSync_quotes')) || []
        };
        
        if (!Array.isArray(state.employees)) state.employees = [];
        if (!Array.isArray(state.shifts)) state.shifts = [];
        if (!Array.isArray(state.quotes)) state.quotes = [];

        const STANDARD_WORK_HOURS_WEEKLY = 45; 
        let mobileMenuOpen = false;
        let quickAddOpen = false;
        let currentTab = 'roster';
        
        let currentWeekStart = getStartOfWeek(new Date());
        let mobileSelectedDayIndex = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;

        // --- Core Utilities ---
        function saveState() {
            try {
                localStorage.setItem('shiftSync_employees', JSON.stringify(state.employees));
                localStorage.setItem('shiftSync_shifts', JSON.stringify(state.shifts));
                localStorage.setItem('shiftSync_quotes', JSON.stringify(state.quotes));
                window.triggerRender();
            } catch (e) {
                window.showToast("Storage error", "error");
            }
        }

        window.escapeHTML = function(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/[&<>'"]/g, match => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[match] || match);
        };

        window.formatCurrency = function(amount) {
            return new Intl.NumberFormat('en-ZA', { style: 'currency', currency: 'ZAR' }).format(amount);
        };

        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = type === 'success' ? 'bg-slate-900 text-white border-slate-800' : 'bg-red-600 text-white border-red-500';
            const icon = type === 'success'
                ? `<svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>`
                : `<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;

            toast.className = `flex items-center gap-3 px-5 py-4 rounded-2xl shadow-xl shadow-slate-900/10 slide-up pointer-events-auto border ${colors}`;
            toast.innerHTML = `${icon} <span class="font-bold text-sm tracking-wide">${window.escapeHTML(message)}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px) scale(0.95)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        function getStartOfWeek(d) {
            const date = new Date(d);
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1); 
            date.setDate(diff);
            date.setHours(0, 0, 0, 0);
            return date;
        }

        function getDatesForWeek(start) {
            return Array.from({length: 7}).map((_, i) => {
                const d = new Date(start);
                d.setDate(d.getDate() + i);
                return d;
            });
        }

        function formatDateForInput(date) {
            const d = new Date(date);
            let month = '' + (d.getMonth() + 1);
            let day = '' + d.getDate();
            const year = d.getFullYear();
            if (month.length < 2) month = '0' + month;
            if (day.length < 2) day = '0' + day;
            return [year, month, day].join('-');
        }

        function getISOWeekNumber(d) {
            const date = new Date(d.getTime());
            date.setHours(0, 0, 0, 0);
            date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
            const week1 = new Date(date.getFullYear(), 0, 4);
            return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
        }

        window.calculateHours = function(start, end) {
            if (!start || !end) return 0;
            const [startHour, startMin] = start.split(':').map(Number);
            const [endHour, endMin] = end.split(':').map(Number);
            let hours = (endHour + endMin / 60) - (startHour + startMin / 60);
            if (hours < 0) hours = 24 + hours; 
            return hours;
        };

        // --- Interaction Logic ---
        window.changeWeek = function(offset) {
            currentWeekStart.setDate(currentWeekStart.getDate() + (offset * 7));
            window.triggerRender();
        };

        window.jumpToToday = function() {
            currentWeekStart = getStartOfWeek(new Date());
            mobileSelectedDayIndex = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
            window.triggerRender();
        };
        
        window.setMobileDay = function(index) {
            mobileSelectedDayIndex = index;
            window.triggerRender();
        };

        window.triggerRender = function() { window.setTab(currentTab); };

        window.toggleMobileMenu = function() {
            mobileMenuOpen = !mobileMenuOpen;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-menu-overlay');
            if(mobileMenuOpen) {
                sidebar.classList.remove('hidden');
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
                setTimeout(() => { if(!mobileMenuOpen) sidebar.classList.add('hidden'); }, 300);
            }
        };

        window.toggleQuickAdd = function() {
            quickAddOpen = !quickAddOpen;
            const menu = document.getElementById('quick-add-menu');
            const overlay = document.getElementById('quick-add-overlay');
            if(quickAddOpen) {
                menu.classList.remove('hidden');
                overlay.classList.remove('hidden');
            } else {
                menu.classList.add('hidden');
                overlay.classList.add('hidden');
            }
        };

        window.closeModal = function() {
            const modal = document.getElementById('modal-content');
            modal.style.transform = 'scale(0.95)';
            modal.style.opacity = '0';
            setTimeout(() => {
                document.getElementById('modal-backdrop').classList.add('hidden');
                document.getElementById('modal-content').innerHTML = '';
                modal.style.transform = '';
                modal.style.opacity = '';
            }, 200);
        };

        // --- Omni-Modals ---

        window.openEmployeeModal = function(id = null) {
            const emp = id ? state.employees.find(e => String(e.id) === String(id)) : null;
            const html = `
                <div class="flex justify-between items-center mb-6 shrink-0 border-b border-slate-100 pb-4">
                    <h3 class="text-2xl font-black text-slate-900 tracking-tight">${emp ? 'Edit Profile' : 'New Staff Member'}</h3>

        window.calcQuoteLive = function() {
            let subtotal = 0;
            document.querySelectorAll('.quote-line-item').forEach(row => {
                const qty = parseFloat(row.querySelector('.q-qty').value) || 0;
                const price = parseFloat(row.querySelector('.q-price').value) || 0;
                subtotal += (qty * price);
            });
            const vat = subtotal * 0.15;
            const total = subtotal + vat;
            
            document.getElementById('q-live-sub').innerText = window.formatCurrency(subtotal);
            document.getElementById('q-live-vat').innerText = window.formatCurrency(vat);
            document.getElementById('q-live-total').innerText = window.formatCurrency(total);
        };

                return;
            }

            let subtotal = 0;

                const qty = parseFloat(row.querySelector('.q-qty').value) || 0;

                shiftsThisWeek.forEach(s => totalHours += window.calculateHours(s.start, s.end));
                
                if (totalHours <= STANDARD_WORK_HOURS_WEEKLY) {
                    standardHours = totalHours;
                } else {
                    standardHours = STANDARD_WORK_HOURS_WEEKLY;
                    overtimeHours = totalHours - STANDARD_WORK_HOURS_WEEKLY;
                }

                const standardPay = standardHours * emp.rate;
                const overtimePay = overtimeHours * (emp.rate * 1.5);
                const grossPay = standardPay + overtimePay;

                return { ...emp, totalHours, standardHours, overtimeHours, standardPay, overtimePay, grossPay };
            });

            const sumHours = payrollDataList.reduce((acc, curr) => acc + curr.totalHours, 0);
            const sumPay = payrollDataList.reduce((acc, curr) => acc + curr.grossPay, 0);
            const sumOvertimeHours = payrollDataList.reduce((acc, curr) => acc + curr.overtimeHours, 0);

            const trPayroll = payrollDataList.map(data => {

        window.openPayslipModal = function(empId) {
            const weekDates = getDatesForWeek(currentWeekStart);
            const periodStart = weekDates[0];
            const periodEnd = weekDates[6];
            periodStart.setHours(0,0,0,0);
            periodEnd.setHours(23,59,59,999);

            const emp = state.employees.find(e => String(e.id) === String(empId));
            if(!emp) return;

            let totalHours = 0;
            const shiftsThisWeek = state.shifts.filter(s => {
                if (String(s.employeeId) !== String(emp.id)) return false;
                const shiftDate = new Date(s.date);
                shiftDate.setHours(12,0,0,0);
                return shiftDate >= periodStart && shiftDate <= periodEnd;
            });
            shiftsThisWeek.forEach(s => totalHours += window.calculateHours(s.start, s.end));

            const standardHours = Math.min(totalHours, STANDARD_WORK_HOURS_WEEKLY);
            const overtimeHours = Math.max(0, totalHours - STANDARD_WORK_HOURS_WEEKLY);
            
            const standardPay = standardHours * emp.rate;
            const overtimePay = overtimeHours * (emp.rate * 1.5);
            const grossPay = standardPay + overtimePay;
            
            const periodStr = `${weekDates[0].toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric'})} - ${weekDates[6].toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric'})}`;
            
            const uifDeduction = grossPay * 0.01;

            const html = `

                        <div class="text-right"><span class="text-slate-400 block text-[10px] uppercase tracking-widest font-bold mb-1.5">Period</span> <span class="font-bold text-slate-900">${periodStr}</span></div>
                        <div><span class="text-slate-400 block text-[10px] uppercase tracking-widest font-bold mb-1.5">Role</span> <span class="font-bold text-slate-700">${window.escapeHTML(emp.role)}</span></div>
                        <div class="text-right"><span class="text-slate-400 block text-[10px] uppercase tracking-widest font-bold mb-1.5">Standard Rate</span> <span class="font-bold text-slate-700">${window.formatCurrency(emp.rate)}/hr</span></div>
                    </div>
                    
                    <table class="w-full text-sm mb-10 border-hidden">

                        </tr>
                        <tr class="border-b border-slate-100">
                            <td class="py-4 px-4 text-slate-800 font-bold">Standard Time</td>
                            <td class="text-right py-4 px-4 font-bold text-slate-900">${standardHours.toFixed(1)} hrs</td>

                        </tr>
                        <tr class="text-red-600 border-b-2 border-slate-100">
                            <td colspan="2" class="py-4 px-4 text-right text-[10px] font-bold uppercase tracking-widest">UIF Contribution (1%)</td>

                    <div class="flex justify-between items-center bg-slate-900 p-6 rounded-2xl shadow-xl shadow-slate-900/20 text-white">

                        Generated securely by ShiftSync SMME OS.

                <div class="flex flex-col sm:flex-row justify-end gap-3 mt-6 no-print">

                    <button onclick="window.print()" class="w-full sm:w-auto flex items-center justify-center space-x-2 px-8 py-3 bg-blue-600 font-bold text-white rounded-xl hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-600/30">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                        <span>Print Document</span>
                    </button>
                </div>
            `;
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('modal-backdrop').classList.remove('hidden');
        };

        window.getQuotesHTML = function() {

                    <td colspan="4" class="py-24 text-center bg-white rounded-3xl border border-dashed border-slate-200 md:border-none">

            ['roster', 'employees', 'payroll', 'quotes'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (btn) {

                        btn.querySelector('div')?.classList.add('group-hover:bg-white', 'group-hover:shadow-sm');
                    }
                }
            });

            if(mobileMenuOpen) window.toggleMobileMenu();
        };
